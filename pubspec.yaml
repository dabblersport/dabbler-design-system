name: dabbler_design_system
description: "Dabbler design system — colour & theming foundation (Material 3, 7 themes, light + dark)."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  # State management for the resolved theme (section + override + mode).
  flutter_riverpod: ^2.6.1

  # Local persistence for the user's theme override + ThemeMode. This is the
  # seam where Supabase sync plugs in — see ThemePreferences in
  # lib/theme/theme_controller.dart.
  shared_preferences: ^2.3.5

  # Forui component library. We map the same Material ColorScheme + Dabbler
  # tokens into FThemeData so Forui and Material widgets stay visually identical.
  forui: ^0.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
